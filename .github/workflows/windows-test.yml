name: Windows Compatibility Test

on:
  push:
    branches: [ main, dev-thq ]
  pull_request:
    branches: [ main, dev-thq ]

jobs:
  test-windows:
    runs-on: windows-latest
    strategy:
      matrix:
        python-version: [3.8, 3.9, '3.10', '3.11']
    
    steps:
    - name: 检出代码
      uses: actions/checkout@v4
    
    - name: 设置Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}
    
    - name: 安装依赖
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    
    - name: 运行Windows兼容性测试
      run: |
        python test_windows.py
    
    - name: 测试GUI模块（无显示）
      run: |
        python -c "
        import sys
        sys.path.insert(0, 'src')
        
        # 设置无头模式
        import os
        os.environ['DISPLAY'] = ''
        
        try:
            from gui_app import DataToPDFApp
            print('GUI模块导入成功')
        except Exception as e:
            if 'DISPLAY' in str(e) or 'Tk' in str(e):
                print('GUI模块导入成功（预期的显示错误）')
            else:
                raise e
        "
    
    - name: 创建测试输出目录
      run: |
        mkdir -p test_output
    
    - name: 测试PDF生成（模拟数据）
      run: |
        python -c "
        import sys
        sys.path.insert(0, 'src')
        
        from pdf.generator import PDFGenerator
        import os
        
        # 创建测试数据
        test_data = {
            '客户编码': 'TEST001',
            '主题': 'Windows Test',
            '总张数': 100
        }
        
        test_params = {
            '张/盒': 10,
            '盒/小箱': 5, 
            '小箱/大箱': 2,
            '选择外观': '外观一'
        }
        
        generator = PDFGenerator()
        print('✅ PDF生成器创建成功')
        print('✅ Windows兼容性测试完成')
        "

  test-cross-platform:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ['3.9']
    
    steps:
    - name: 检出代码
      uses: actions/checkout@v4
    
    - name: 设置Python
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}
    
    - name: 安装依赖
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    
    - name: 跨平台兼容性测试
      run: |
        python test_windows.py